<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Премьер-Лига 2026 · Сахаяна</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F3EBD8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px 16px 40px;
      color: #1e1e2a;
      line-height: 1.4;
    }
    .container { max-width: 750px; margin: 0 auto; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; color: #1e293b; }
    .subhead { color: #5b6b7c; margin-bottom: 16px; border-left: 4px solid #C779AD; padding-left: 12px; }
    
    .stats-panel {
      background: white; border-radius: 24px; padding: 18px; margin-bottom: 20px;
      border: 2px solid #D8C1ED;
    }
    .level-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid #EFDDD9; flex-wrap: wrap;
    }
    .level-row:last-child { border-bottom: none; }
    .level-name { width: 110px; font-weight: 700; font-size: 1.1rem; }
    .level-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .level-stat { display: flex; align-items: baseline; gap: 6px; }
    .stat-label { font-size: 0.85rem; color: #5b6b7c; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: #C779AD; }
    
    .add-person {
      background: white; border-radius: 24px; padding: 18px; margin-bottom: 24px;
      border: 2px dashed #C779AD;
    }
    .form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .form-group { flex: 1; min-width: 130px; }
    label { font-size: 0.8rem; font-weight: 600; color: #5b6b7c; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #D8C1ED; border-radius: 16px; font-size: 0.95rem; }
    .btn-add {
      background: #C779AD; color: white; border: none; padding: 10px 20px;
      border-radius: 40px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
    }
    
    .person-card {
      background: white; border-radius: 24px; padding: 18px; margin-bottom: 16px;
      border: 2px solid #D8C1ED;
    }
    .card-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .person-name { font-size: 1.3rem; font-weight: 700; }
    .super-check {
      display: flex; align-items: center; gap: 8px; margin-left: auto;
      background: #F9F6F0; padding: 6px 14px; border-radius: 40px;
    }
    .super-check input { width: 20px; height: 20px; accent-color: #C779AD; }
    
    .month-block {
      background: #F9F6F0; border-radius: 20px; padding: 16px; margin: 12px 0;
    }
    .month-title { font-weight: 700; margin-bottom: 12px; color: #1e293b; }
    .orders-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .order-input { width: 80px; padding: 8px; text-align: center; border-radius: 16px; border: 1px solid #D8C1ED; }
    .progress-bar { height: 10px; background: #EFDDD9; border-radius: 10px; margin: 12px 0; }
    .progress-fill { height: 10px; background: #C779AD; border-radius: 10px; width: 0%; }
    .status-badge {
      display: inline-block; padding: 6px 16px; border-radius: 40px;
      font-weight: 600; font-size: 0.9rem;
    }
    .silver { background: #D8C1ED; color: #1e293b; }
    .gold { background: #C779AD; color: white; }
    .none { background: #F3EBD8; color: #5b6b7c; }
    .failed { background: #EFDDD9; color: #5b6b7c; }
    
    .delete-btn {
      background: none; border: 1px solid #C779AD; color: #C779AD;
      padding: 6px 14px; border-radius: 30px; cursor: pointer;
    }
    .add-order-btn {
      background: none; border: 1px dashed #C779AD; color: #C779AD;
      padding: 8px 16px; border-radius: 30px; font-size: 0.9rem; cursor: pointer;
    }
    
    .footer-note { margin-top: 20px; text-align: right; font-weight: 600; color: #C779AD; }
    .reset-link { text-align: center; margin-top: 12px; }
    .reset-link a { color: #9CA7A1; font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <h1>👑 ПРЕМЬЕР-ЛИГА 2026</h1>
  <div class="subhead">Твой путь к вершине</div>

  <div class="stats-panel" id="statsPanel"></div>

  <div class="add-person">
    <div style="font-weight: 700; margin-bottom: 12px;">➕ Добавить нового партнёра</div>
    <div class="form-row">
      <div class="form-group">
        <label>👤 Имя</label>
        <input type="text" id="newName" placeholder="Имя">
      </div>
      <div class="form-group">
        <label>📅 Статус</label>
        <select id="newType">
          <option value="new">Новый НП</option>
          <option value="old">Старый НП</option>
        </select>
      </div>
      <button class="btn-add" id="addPersonBtn">Добавить</button>
    </div>
  </div>

  <div id="peopleList"></div>

  <div class="reset-link"><a id="resetLink">🔄 Сбросить всё и начать заново</a></div>
  <div class="footer-note">Разбогатей 🚀</div>
</div>

<script>
  (function(){
    const STORAGE_KEY = 'premier_liga_2026_final_v2';
    let people = [];
    
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved) { try { people = JSON.parse(saved); } catch(e){} }
      else { people = []; }
    }
    
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(people)); }
    
    function calculateStats() {
      let np250 = 0, np500 = 0, supers = 0;
      people.forEach(p => {
        const m1 = (p.month1 || []).reduce((s, v) => s + v, 0);
        const m2 = (p.month2 || []).reduce((s, v) => s + v, 0);
        const total = m1 + m2;
        if(p.type === 'new') {
          if(total >= 500) np500++;
          else if(total >= 250) np250++;
        }
        if(p.isSuper) supers++;
      });
      
      const silverNp250 = Math.min(np250, 7), silverNp500 = Math.min(np500, 3), silverSuper = Math.min(supers, 3);
      const goldNp250 = Math.min(np250, 5), goldNp500 = Math.min(np500, 5), goldSuper = Math.min(supers, 4);
      const brilliantNp250 = Math.min(np250, 3), brilliantNp500 = Math.min(np500, 7), brilliantSuper = Math.min(supers, 5);
      
      return { silver: { np250: silverNp250, np500: silverNp500, super: silverSuper },
               gold: { np250: goldNp250, np500: goldNp500, super: goldSuper },
               brilliant: { np250: brilliantNp250, np500: brilliantNp500, super: brilliantSuper } };
    }
    
    function renderStats() {
      const s = calculateStats();
      document.getElementById('statsPanel').innerHTML = `
        <div class="level-row"><span class="level-name">🥈 СЕРЕБРО</span><div class="level-stats">
          <div class="level-stat"><span class="stat-label">НП 250:</span> <span class="stat-value">${s.silver.np250}/7</span></div>
          <div class="level-stat"><span class="stat-label">НП 500:</span> <span class="stat-value">${s.silver.np500}/3</span></div>
          <div class="level-stat"><span class="stat-label">Супер:</span> <span class="stat-value">${s.silver.super}/3</span></div>
        </div></div>
        <div class="level-row"><span class="level-name">🥇 ЗОЛОТО</span><div class="level-stats">
          <div class="level-stat"><span class="stat-label">НП 250:</span> <span class="stat-value">${s.gold.np250}/5</span></div>
          <div class="level-stat"><span class="stat-label">НП 500:</span> <span class="stat-value">${s.gold.np500}/5</span></div>
          <div class="level-stat"><span class="stat-label">Супер:</span> <span class="stat-value">${s.gold.super}/4</span></div>
        </div></div>
        <div class="level-row"><span class="level-name">💎 БРИЛЛИАНТ</span><div class="level-stats">
          <div class="level-stat"><span class="stat-label">НП 250:</span> <span class="stat-value">${s.brilliant.np250}/3</span></div>
          <div class="level-stat"><span class="stat-label">НП 500:</span> <span class="stat-value">${s.brilliant.np500}/7</span></div>
          <div class="level-stat"><span class="stat-label">Супер:</span> <span class="stat-value">${s.brilliant.super}/5</span></div>
        </div></div>
      `;
    }
    
    function renderPersonCard(person, index) {
      const m1 = person.month1 || [], m2 = person.month2 || [];
      const m1Total = m1.reduce((s, v) => s + v, 0), m2Total = m2.reduce((s, v) => s + v, 0);
      const total = m1Total + m2Total;
      const m1Done = m1Total >= 250, m2Done = m2Total >= 250;
      const isGold = total >= 500;
      const isSilver = total >= 250 && total < 500;
      const isFailed = total < 250 && person.type === 'new';
      
      let statusText = '', statusClass = 'none';
      if(person.type === 'old') { statusText = '👑 Старый НП'; statusClass = 'gold'; }
      else if(isGold) { statusText = '🏆 ЗОЛОТО (500+ VP)'; statusClass = 'gold'; }
      else if(isSilver) { statusText = '🥈 СЕРЕБРО (250+ VP)'; statusClass = 'silver'; }
      else if(isFailed) { statusText = '❌ ВЫБЫЛ (<250 VP)'; statusClass = 'failed'; }
      else { statusText = `⏳ В процессе`; statusClass = 'none'; }
      
      let m1OrdersHtml = '', m2OrdersHtml = '';
      m1.forEach((v, i) => { m1OrdersHtml += `<input type="number" class="order-input" value="${v}" data-person="${index}" data-month="1" data-order="${i}" placeholder="VP" inputmode="numeric">`; });
      m2.forEach((v, i) => { m2OrdersHtml += `<input type="number" class="order-input" value="${v}" data-person="${index}" data-month="2" data-order="${i}" placeholder="VP" inputmode="numeric">`; });
      
      return `<div class="person-card">
        <div class="card-header">
          <span class="person-name">${person.name} ${person.type === 'old' ? '(Старый)' : ''}</span>
          <div class="super-check"><label>👑 Супервайзер</label><input type="checkbox" data-person="${index}" class="super-checkbox" ${person.isSuper ? 'checked' : ''}></div>
          <button class="delete-btn" data-person="${index}">✕ Удалить</button>
        </div>
        
        ${person.type === 'new' ? `
        <div class="month-block">
          <div class="month-title">📆 МЕСЯЦ 1 ${m1Done ? '✅' : ''}</div>
          <div class="orders-row">${m1OrdersHtml}</div>
          <button class="add-order-btn" data-person="${index}" data-month="1">➕ Добавить заказ</button>
          <div style="display: flex; justify-content: space-between; margin-top: 12px;">
            <span>📊 Набрано: <strong>${m1Total} VP</strong> / 250 VP</span>
            <span>⏳ Осталось: <strong>${Math.max(250 - m1Total, 0)} VP</strong></span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((m1Total/250)*100, 100)}%;"></div></div>
        </div>
        <div class="month-block">
          <div class="month-title">📆 МЕСЯЦ 2 ${m2Done ? '✅' : ''}</div>
          <div class="orders-row">${m2OrdersHtml}</div>
          <button class="add-order-btn" data-person="${index}" data-month="2">➕ Добавить заказ</button>
          <div style="display: flex; justify-content: space-between; margin-top: 12px;">
            <span>📊 Набрано: <strong>${m2Total} VP</strong> / 250 VP</span>
            <span>⏳ Осталось: <strong>${Math.max(250 - m2Total, 0)} VP</strong></span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((m2Total/250)*100, 100)}%;"></div></div>
        </div>
        ` : ''}
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
          <span class="status-badge ${statusClass}">${statusText}</span>
          <span style="font-weight:600;">💰 Сумма: ${total} VP</span>
        </div>
      </div>`;
    }
    
    function renderAll() {
      const list = document.getElementById('peopleList');
      list.innerHTML = people.length ? people.map((p, i) => renderPersonCard(p, i)).join('') 
        : '<p style="color:#9CA7A1; padding:30px; text-align:center; background:white; border-radius:24px;">Пока никого нет. Добавь первого партнёра! 🚀</p>';
      renderStats();
      attachEvents();
    }
    
    function attachEvents() {
      // Сохраняем только при ПОТЕРЕ ФОКУСА (когда ушла с поля)
      document.querySelectorAll('.order-input').forEach(i => {
        i.addEventListener('blur', e => {
          const p = e.target.dataset.person;
          const m = e.target.dataset.month;
          const o = e.target.dataset.order;
          const monthKey = m === '1' ? 'month1' : 'month2';
          const val = parseInt(e.target.value) || 0;
          if(people[p]?.[monthKey]) {
            people[p][monthKey][o] = val;
            saveData();
            renderAll();
          }
        });
      });
      
      document.querySelectorAll('.add-order-btn').forEach(b => b.addEventListener('click', e => {
        const p = e.target.dataset.person, m = e.target.dataset.month;
        const monthKey = m === '1' ? 'month1' : 'month2';
        if(people[p]) { if(!people[p][monthKey]) people[p][monthKey] = []; people[p][monthKey].push(0); saveData(); renderAll(); }
      }));
      
      document.querySelectorAll('.super-checkbox').forEach(c => c.addEventListener('change', e => {
        const p = e.target.dataset.person;
        if(people[p]) { people[p].isSuper = e.target.checked; saveData(); renderStats(); }
      }));
      
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', e => {
        if(confirm('Удалить партнёра?')) { people.splice(e.target.dataset.person, 1); saveData(); renderAll(); }
      }));
    }
    
    document.getElementById('addPersonBtn').addEventListener('click', () => {
      const name = document.getElementById('newName').value.trim();
      const type = document.getElementById('newType').value;
      if(!name) { alert('Введи имя'); return; }
      people.push({ name, type, month1: [], month2: [], isSuper: false });
      saveData(); renderAll(); document.getElementById('newName').value = '';
    });
    
    document.getElementById('resetLink').addEventListener('click', () => {
      if(confirm('Удалить все данные?')) { localStorage.removeItem(STORAGE_KEY); people = []; renderAll(); }
    });
    
    loadData(); renderAll();
  })();
</script>
</body>
</html>
